<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#3a3a3a">
    <title>拼圖大師 2026</title>
    <link rel="manifest" id="manifest-placeholder">
    <style>
        /* === 核心變數與配色定義 === */
        :root {
            --bg-grad: radial-gradient(circle at center, #3a3a3a, #1a1a1a);
            --board-bg: #e0c38c;
            --board-texture: repeating-linear-gradient(45deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 2px, transparent 2px, transparent 4px);
            --line-color: #5d4037;
            --border-style: 8px solid #5d4037;
            --safe-top: env(safe-area-inset-top, 0px); 
            --safe-left: env(safe-area-inset-left, 0px);
            --safe-right: env(safe-area-inset-right, 0px);
            --header-width: 260px;
        }

        /* === 視覺風格定義 === */
        body.t-classic { --bg-grad: radial-gradient(circle, #3e2723 0%, #1a0f0d 100%); --board-bg: #deb887; --line-color: #5d4037; --border-style: 10px ridge #6d4c41; }
        body.t-ink { --bg-grad: linear-gradient(to bottom, #cfd9df 0%, #e2ebf0 100%); --board-bg: #f5f5f5; --board-texture: none; --line-color: #424242; --border-style: 8px double #424242; }
        body.t-jade { --bg-grad: radial-gradient(circle, #004d40, #00251a); --board-bg: #80cbc4; --line-color: #004d40; --border-style: 10px inset #00695c; }
        body.t-wood { --bg-grad: linear-gradient(135deg, #4e342e, #1b100d); --board-bg: #8d6e63; --line-color: #3e2723; --border-style: 10px groove #4e342e; }
        body.t-gold { --bg-grad: radial-gradient(circle, #2b2b2b, #000); --board-bg: #111; --line-color: #ffd700; --border-style: 8px solid #ffd700; }
        body.t-ocean { --bg-grad: linear-gradient(to bottom, #0d47a1, #000051); --board-bg: #1976d2; --line-color: #bbdefb; --border-style: 8px double #90caf9; }
        body.t-royal { --bg-grad: linear-gradient(135deg, #4a148c, #1a0033); --board-bg: #7b1fa2; --line-color: #e1bee7; --border-style: 8px solid #4a0072; }
        body.t-beast { --bg-grad: radial-gradient(circle, #d35400, #2c3e50); --board-bg: #e67e22; --line-color: #5e3105; --border-style: 10px dashed #8e44ad; }
        body.t-playful { --bg-grad: linear-gradient(120deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%); --board-bg: #fff0f5; --line-color: #ff69b4; --border-style: 8px dotted #ff69b4; }
        body.t-shan { --bg-grad: linear-gradient(to top, #cfd9df 0%, #e2ebf0 100%); --board-bg: #d7e4e8; --line-color: #5d6d7e; --border-style: 8px double #5d6d7e; }
        body.t-cute { --bg-grad: linear-gradient(to right, #a1c4fd 0%, #c2e9fb 100%); --board-bg: #e0f7fa; --line-color: #4dd0e1; --border-style: 10px solid #b39ddb; }
        body.t-cyber { --bg-grad: repeating-linear-gradient(90deg, #111 0px, #111 2px, #000 2px, #000 40px); --board-bg: #050505; --board-texture: none; --line-color: #0ff; --border-style: 8px solid #0ff; }
        body.t-sketch { --bg-grad: #fff; --board-bg: #fff; --board-texture: none; --line-color: #222; --border-style: 6px solid #222; }
        body.t-dark { --bg-grad: linear-gradient(135deg, #232526, #414345); --board-bg: #333; --board-texture: none; --line-color: #777; --border-style: 8px solid #555; }

        html, body { height: 100%; width: 100%; overflow: hidden; overscroll-behavior: none; }
        
        body { 
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif; 
            background: var(--bg-grad); 
            margin: 0; 
            display: flex; 
            flex-direction: row; 
            align-items: center; 
            justify-content: center;
            color: white; 
            transition: background 0.5s; 
            touch-action: none; 
            box-sizing: border-box; 
            padding-left: var(--safe-left);
            padding-right: var(--safe-right);
        }

        header { 
            width: var(--header-width); 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            gap: 15px; 
            flex-shrink: 0; 
            z-index: 100; 
            background: rgba(0,0,0,0.4); 
            backdrop-filter: blur(8px); 
            border-right: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 4px 0 10px rgba(0,0,0,0.2); 
            box-sizing: border-box;
            padding: 20px 10px;
        }

        .header-top { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; width: 100%; margin-bottom: 10px; }
        h2 { font-size: 1.2rem; margin: 0; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); text-align: center; font-weight: 700; }
        .status { color: #f1c40f; font-weight: bold; font-size: 1rem; text-shadow: 0 1px 3px rgba(0,0,0,0.9); line-height: 1.4; text-align: center; }

        .btn-group { display: flex; flex-direction: column; gap: 12px; align-items: center; width: 100%; }
        .btn { width: 85%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #f0f0f0; padding: 8px 12px; border-radius: 20px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; white-space: nowrap; backdrop-filter: blur(4px); box-shadow: 0 2px 5px rgba(0,0,0,0.2); text-align: center;}
        .btn:active { transform: scale(0.95); background: rgba(255,255,255,0.2); }
        .btn-red { background: rgba(220, 50, 50, 0.85); border: none; }
        .btn-undo { background: rgba(230, 140, 20, 0.85); border: none; }
        .btn-hint { background: #e67e22; border: none; font-size: 0.8rem; padding: 4px 10px; height: 38px; border-radius: 8px; }

        @media (orientation: portrait) {
            body {
                flex-direction: column;
                padding-top: var(--safe-top);
                justify-content: flex-start;
            }
            
            header {
                width: 100%;
                height: auto;
                flex-direction: column;
                border-right: none;
                border-bottom: 1px solid rgba(255,255,255,0.1);
                padding: 10px 0;
                gap: 8px;
                background: rgba(0,0,0,0.3);
            }

            .header-top { flex-direction: row; width: 95%; max-width: 600px; gap: 15px; margin-bottom: 0; }
            h2 { font-size: 1.1rem; white-space: nowrap; }
            .status { font-size: 0.9rem; }
            
            .btn-group { flex-direction: row; width: auto; gap: 8px; }
            .btn { width: auto; padding: 5px 12px; font-size: 0.85rem; }
        }

        #settings { 
            display: none; 
            position: fixed; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            z-index: 2000; 
            background: rgba(30, 30, 30, 0.95); 
            width: 340px; 
            padding: 20px; 
            border-radius: 16px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.9); 
            border: 1px solid rgba(255,255,255,0.1); 
            max-height: 90vh; 
            overflow-y: auto; 
            box-sizing: border-box; 
        }
        .set-row { margin-bottom: 12px; }
        .flex-split { display: flex; gap: 10px; justify-content: space-between; }
        .flex-split > div { flex: 1; display: flex; flex-direction: column; }
        .vol-row > div { padding: 0 10px; } 
        label { font-size: 0.85rem; margin-bottom: 5px; color: #aaa; display: block; }
        .vol-hint { color: #f1c40f; font-weight: bold; margin-left: 4px; }
        select, input[type=range] { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid #555; background: #222; color: #fff; height: 38px; box-sizing: border-box;}

        #game-container { 
            flex-grow: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden; 
            position: relative; 
            width: 100%; 
            height: 100%;
            box-sizing: border-box; 
            padding: 10px;
        }
        
        .board-wrap { 
            position: relative; background: var(--board-bg); background-image: var(--board-texture); 
            border: var(--border-style); border-radius: 6px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.7), inset 0 0 60px rgba(0,0,0,0.2); 
            padding: 0; 
            box-sizing: border-box; flex-shrink: 0; transition: all 0.3s ease;
        }
        
        .board-inner { position: relative; width: 100%; height: 100%; overflow: hidden; border-radius: 2px; }
        
        /* 拼圖塊樣式 - Canvas 切割版 */
        .tile {
            position: absolute;
            background-repeat: no-repeat;
            background-size: 100% 100%; 
            box-sizing: border-box;
            border: none;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.15); 
            transition: top 0.2s, left 0.2s, transform 0.1s, box-shadow 0.2s;
            cursor: pointer;
            z-index: 10;
        }
        .tile:hover { z-index: 20; box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.6); }
        .tile.selected {
            z-index: 30;
            box-shadow: inset 0 0 0 2px #f1c40f, 0 0 15px #f1c40f; 
            transform: scale(1.02);
        }

        /* 提示層：移除 flex 置中，改用 absolute 定位邏輯 */
        #preview-layer {
            position: fixed; 
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: transparent; 
            z-index: 9999;
            display: none;
            opacity: 0; transition: opacity 0.3s;
            pointer-events: none; /* 讓點擊穿透 */
        }
        #preview-layer.show { display: block; opacity: 1; }
        
        /* 提示圖片容器 - 絕對定位以便全方位拖曳/縮放 */
        #preview-box {
            position: absolute; /* 改為 Absolute */
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            border: 4px solid #fff;
            cursor: move;
            touch-action: none; 
            pointer-events: auto; /* 恢復點擊 */
            overflow: visible; /* 允許把手突出 */
            min-width: 100px;
            min-height: 100px;
        }
        
        #preview-img {
            display: block;
            width: 100%;
            height: 100%;
            pointer-events: none; 
            user-select: none;
            -webkit-user-drag: none;
            object-fit: fill; 
        }
        
        /* 關閉按鈕 */
        #hint-close-btn {
            position: absolute; 
            top: 0; right: 0; 
            width: 44px; height: 44px;
            background: rgba(220, 20, 20, 0.9);
            color: #fff;
            border: 2px solid #fff;
            border-top: none; border-right: none; 
            border-bottom-left-radius: 12px;
            font-size: 24px;
            font-weight: bold;
            display: none; 
            cursor: pointer;
            z-index: 600;
            line-height: 40px;
            text-align: center;
        }
        #hint-close-btn:active { background: #b00; }

        /* === 新增：4角縮放把手 === */
        .resize-handle {
            position: absolute;
            width: 24px;
            height: 24px;
            background: rgba(255, 255, 255, 0.3); /* 半透明方便看到 */
            border: 2px solid #fff;
            border-radius: 50%;
            z-index: 700;
            box-shadow: 0 0 5px rgba(0,0,0,0.5);
        }
        /* 四角定位與游標 */
        .rh-nw { top: -12px; left: -12px; cursor: nwse-resize; }
        .rh-ne { top: -12px; right: -12px; cursor: nesw-resize; }
        .rh-sw { bottom: -12px; left: -12px; cursor: nesw-resize; }
        .rh-se { bottom: -12px; right: -12px; cursor: nwse-resize; }

        @keyframes memorize {
            0% { transform: rotate(-5deg) scale(0.8); opacity: 0; }
            20% { transform: rotate(0deg) scale(1); opacity: 1; }
            80% { transform: rotate(0deg) scale(1); opacity: 1; }
            100% { transform: rotate(5deg) scale(1.1); opacity: 0; }
        }

        #win-overlay { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%,-50%); 
            width: 80%; height: 80%;
            display: flex; justify-content: center; align-items: center; text-align: center;
            pointer-events: none; opacity: 0; z-index: 1000; 
            font-family: "Microsoft JhengHei", sans-serif; font-weight: 900; 
            font-size: calc(var(--board-size, 300px) * 0.12);
            letter-spacing: calc(var(--board-size, 300px) * 0.01); 
            color: #fff; text-shadow: 0 0 10px #0ff, 0 0 20px #0ff, 0 0 40px #0ff; 
            line-height: 1.2;
        }
        #win-overlay.show { opacity: 1; animation: win 2.5s ease-in-out infinite; }
        @keyframes win { 
            0% { transform: translate(-50%,-50%) scale(0.5); opacity: 0; } 
            20%, 100% { transform: translate(-50%,-50%) scale(1) rotate(-3deg); opacity: 1; } 
            60% { transform: translate(-50%,-52%) scale(1) rotate(3deg); } 
        }

        #rules-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3000; justify-content: center; align-items: center; }
        .rules-content { background: #2b2b2b; width: 90%; max-width: 500px; border-radius: 12px; padding: 25px; color: #ddd; }
        .rules-content h3 { color: #f1c40f; text-align: center; border-bottom: 1px solid #555; padding-bottom: 10px;}
        .close-rules { width: 100%; padding: 10px; background: #cc0000; color: #fff; border: none; border-radius: 8px; margin-top: 20px; cursor: pointer; font-weight: bold;}
    </style>
</head>
<body class="t-classic">

<header id="main-header">
    <div class="header-top">
        <h2 id="app-title">拼圖大師 2026</h2>
        <div class="status" id="msg">選擇圖片開始</div>
    </div>
    <div class="btn-group">
        <button class="btn" id="btn-settings" onclick="toggleSet()">⚙️ 設定</button>
        <button class="btn btn-undo" id="btn-undo" onclick="undo()">↩️ 復原</button>
        <button class="btn btn-red" id="btn-restart" onclick="restart()">🔄 重開</button>
    </div>
</header>

<div id="settings">
    <div class="set-row flex-split">
        <div>
            <label id="lbl-diff">難度等級</label>
            <select id="diff-sel" onchange="changeDiff()">
                <option value="2">2 x 2 (新手)</option>
                <option value="3" selected>3 x 3 (預設)</option>
                <option value="4">4 x 4</option>
                <option value="5">5 x 5</option>
                <option value="7">7 x 7</option>
                <option value="9">9 x 9</option>
                <option value="12">12 x 12</option>
            </select>
        </div>
        <div>
            <label id="lbl-theme">視覺風格</label>
            <select id="theme-sel" onchange="changeTheme()">
                <option value="t-classic">💎 經典</option>
                <option value="t-ink">🏔️ 水墨</option>
                <option value="t-jade">📿 翡翠</option>
                <option value="t-wood">🪵 紅木</option>
                <option value="t-gold">👑 黑金</option>
                <option value="t-ocean">🌊 深海</option>
                <option value="t-royal">🏛️ 紫禁</option>
                <option value="t-beast">🦁 野獸</option>
                <option value="t-playful">🎈 俏皮</option>
                <option value="t-shan">🖌️ 山水</option>
                <option value="t-cute">🍬 可愛</option>
                <option value="t-cyber">🤖 賽博</option>
                <option value="t-sketch">✏️ 素描</option>
                <option value="t-dark">🌃 暗黑</option>
            </select>
        </div>
    </div>

    <div class="set-row">
        <label id="lbl-img">關卡圖片</label>
        <div style="display: flex; gap: 10px; width: 100%;">
            <select id="img-sel" onchange="changeImage()" style="flex: 1; width: 0;">
            </select>
            <button class="btn btn-hint" id="btn-hint" onclick="showHint()" style="flex: 1; width: 0; margin-left: auto; display:flex; align-items:center; justify-content:center;">👁️ 圖片提示</button>
        </div>
    </div>

    <div class="set-row flex-split">
        <div>
            <label id="lbl-music">背景音樂</label>
            <select id="music-sel" onchange="changeMusic()">
                <option value="none">🔇 靜音</option>
                <option value="01">🎵 樂曲 01</option>
                <option value="02">🎵 樂曲 02</option>
                <option value="03">🎵 樂曲 03</option>
                <option value="04"  selected>🎵 樂曲 04</option>
                <option value="05">🎵 樂曲 05</option>
                <option value="06">🎵 樂曲 06</option>
                <option value="07">🎵 樂曲 07</option>
            </select>
        </div>
        <div>
            <label id="lbl-lang">語言</label>
            <select id="lang-sel" onchange="changeLang()">
                <option value="tw" selected>繁中</option>
                <option value="cn">简中</option>
                <option value="en">English</option>
            </select>
        </div>
    </div>

    <div class="set-row flex-split vol-row">
        <div>
            <label id="lbl-vol-bgm">音樂音量<span id="bgm-val-hint" class="vol-hint">20</span></label>
            <input type="range" id="bgm-vol" min="0" max="100" value="20" oninput="adjBgm()">
        </div>
        <div>
            <label id="lbl-vol-sfx">音效音量<span id="sfx-val-hint" class="vol-hint">50</span></label>
            <input type="range" id="sfx-vol" min="0" max="100" value="50" oninput="adjSfx()">
        </div>
    </div>
    
    <div class="set-row flex-split" style="margin-top:10px;">
        <button class="btn" id="btn-rules" onclick="toggleRules()" style="flex:1; background:#2c3e50; padding: 10px;">📖 規則</button>
        <button class="btn" id="btn-home" onclick="goHome()" style="flex:1; background:#c0392b; padding: 10px;">🏠 回首頁</button>
    </div>

    <button class="btn" id="btn-done" style="width:100%; background:#444; padding: 10px; margin-top:10px;" onclick="toggleSet()">完成設定</button>
</div>

<div id="rules-modal">
    <div class="rules-content">
        <h3 id="rules-title">拼圖規則</h3>
        <p id="rules-p-nature">考驗記憶與觀察力的圖片還原遊戲。</p>
        <ul id="rules-ul-basic" style="padding-left: 20px; line-height: 1.6;">
            <li>遊戲開始前，完整圖片會旋轉展示 3 秒，請記住它！</li>
            <li>背景中的圖片已被隨機打亂。</li>
            <li>點擊一個方塊選取，再點擊另一個方塊進行<b>交換</b>。</li>
            <li>將所有方塊還原到正確位置即可獲勝。</li>
        </ul>
        <button class="close-rules" id="btn-close-rules" onclick="toggleRules()">關閉說明</button>
    </div>
</div>

<div id="game-container">
    <div class="board-wrap" id="board-wrap">
        <div class="board-inner" id="board">
            <div id="tiles-container"></div>
            <div id="win-overlay"></div>
        </div>
    </div>
</div>

<div id="preview-layer">
    <div id="preview-box">
        <img id="preview-img" src="" alt="Preview">
        <button id="hint-close-btn" onclick="closeHint()">✕</button>
        <div class="resize-handle rh-nw" data-dir="nw"></div>
        <div class="resize-handle rh-ne" data-dir="ne"></div>
        <div class="resize-handle rh-se" data-dir="se"></div>
        <div class="resize-handle rh-sw" data-dir="sw"></div>
    </div>
</div>

<audio id="bgm" loop></audio>

const TRANSLATIONS = {

/* === 進階互動：拖曳移動 + 四角縮放 === */
const pBox = document.getElementById("preview-box");
let interactionState = {
    isDragging: false,
    isResizing: false,
    resizeDir: '', // nw, ne, sw, se
    startX: 0,
    startY: 0,
    startLeft: 0,
    startTop: 0,
    startWidth: 0,
    startHeight: 0
};

// 綁定主事件 (移動)
pBox.addEventListener('mousedown', onInteractStart);
pBox.addEventListener('touchstart', onInteractStart, {passive: false});

// 綁定縮放把手事件
document.querySelectorAll('.resize-handle').forEach(el => {
    el.addEventListener('mousedown', onResizeStart);
    el.addEventListener('touchstart', onResizeStart, {passive: false});
});

// 全局移動與結束監聽
window.addEventListener('mousemove', onInteractMove);
window.addEventListener('touchmove', onInteractMove, {passive: false});
window.addEventListener('mouseup', onInteractEnd);
window.addEventListener('touchend', onInteractEnd);

function onResizeStart(e) {
    // 關鍵：阻止冒泡，避免觸發拖曳
    e.stopPropagation();
    e.preventDefault(); 
    
    const touch = e.type.startsWith('touch') ? e.touches[0] : e;
    const rect = pBox.getBoundingClientRect();
    
    interactionState.isResizing = true;
    interactionState.resizeDir = e.target.getAttribute('data-dir');
    interactionState.startX = touch.clientX;
    interactionState.startY = touch.clientY;
    
    // 紀錄當前幾何狀態
    interactionState.startWidth = rect.width;
    interactionState.startHeight = rect.height;
    interactionState.startLeft = pBox.offsetLeft;
    interactionState.startTop = pBox.offsetTop;
}

function onInteractStart(e) {
    if (e.target.id === 'hint-close-btn') return;
    // 只有點擊圖片本身或Box才拖曳，避免誤觸其他
    if (interactionState.isResizing) return;
    
    const touch = e.type.startsWith('touch') ? e.touches[0] : e;
    
    interactionState.isDragging = true;
    interactionState.startX = touch.clientX;
    interactionState.startY = touch.clientY;
    interactionState.startLeft = pBox.offsetLeft;
    interactionState.startTop = pBox.offsetTop;
}

function onInteractMove(e) {
    if (!interactionState.isDragging && !interactionState.isResizing) return;
    e.preventDefault(); // 防止滾動
    
    const touch = e.type.startsWith('touch') ? e.touches[0] : e;
    const dx = touch.clientX - interactionState.startX;
    const dy = touch.clientY - interactionState.startY;
    
    if (interactionState.isDragging) {
        // 拖曳邏輯：單純更新 Top / Left
        pBox.style.left = (interactionState.startLeft + dx) + 'px';
        pBox.style.top = (interactionState.startTop + dy) + 'px';
    } 
    else if (interactionState.isResizing) {
        // 縮放邏輯：根據角落調整 Top/Left/Width/Height
        const s = interactionState;
        const dir = s.resizeDir;
        
        let newW = s.startWidth;
        let newH = s.startHeight;
        let newL = s.startLeft;
        let newT = s.startTop;
        
        // 最小尺寸限制
        const MIN_SIZE = 100;
        
        if (dir.includes('e')) { // 右側：寬度增加
            newW = Math.max(MIN_SIZE, s.startWidth + dx);
        }
        if (dir.includes('s')) { // 下側：高度增加
            newH = Math.max(MIN_SIZE, s.startHeight + dy);
        }
        if (dir.includes('w')) { // 左側：寬度增加(反向)，Left 改變
            // 計算原本右邊界 X
            const rightEdge = s.startLeft + s.startWidth;
            // 新的寬度 = 原本寬度 - dx
            // 但因為有 min-width，要反算
            const rawNewW = s.startWidth - dx;
            if (rawNewW >= MIN_SIZE) {
                newW = rawNewW;
                newL = s.startLeft + dx;
            } else {
                newW = MIN_SIZE;
                newL = rightEdge - MIN_SIZE;
            }
        }
        if (dir.includes('n')) { // 上側：高度增加(反向)，Top 改變
            const bottomEdge = s.startTop + s.startHeight;
            const rawNewH = s.startHeight - dy;
            if (rawNewH >= MIN_SIZE) {
                newH = rawNewH;
                newT = s.startTop + dy;
            } else {
                newH = MIN_SIZE;
                newT = bottomEdge - MIN_SIZE;
            }
        }
        
        pBox.style.width = newW + 'px';
        pBox.style.height = newH + 'px';
        pBox.style.left = newL + 'px';
        pBox.style.top = newT + 'px';
    }
}

function onInteractEnd() {
    interactionState.isDragging = false;
    interactionState.isResizing = false;
}

window.onload = () => {
    initImgList();
    resizeBoard(); 
    audio.src = getMp3Path(document.getElementById('music-sel').value);
    restart(); 
    window.addEventListener('resize', () => { setTimeout(resizeBoard, 100); });

function initImgList() {
    const sel = document.getElementById('img-sel');
    sel.innerHTML = "";
    let optR = document.createElement('option');
    optR.value = "random";
    optR.text = TRANSLATIONS[currentLang].random;
    sel.appendChild(optR);

    IMAGE_FILES.forEach(f => {
        let opt = document.createElement('option');
        opt.value = f; 
        let displayName = f.substring(0, f.lastIndexOf('.')) || f;
        opt.text = displayName;

    });
}

function resizeBoard() { 
    const wrap = document.getElementById('board-wrap');
    const container = document.getElementById('game-container');
    const cWidth = container.clientWidth;
    const cHeight = container.clientHeight;
    const padding = 20;
    const finalSize = Math.min(cWidth - padding, cHeight - padding);
    
    wrap.style.width = `${finalSize}px`;
    wrap.style.height = `${finalSize}px`;
    wrap.style.setProperty('--board-size', `${finalSize}px`);
    
    renderTiles();
}

function getImageUrl() {
    let val = document.getElementById('img-sel').value;
    if (val === 'random') {
        const randIdx = Math.floor(Math.random() * IMAGE_FILES.length);
        val = IMAGE_FILES[randIdx];
    }
    
    if(USE_PLACEHOLDER) {
        let seed = 0;
        for(let i=0; i<val.length; i++) seed += val.charCodeAt(i);
        return `https://picsum.photos/seed/${seed}/800/800`;
    }
    return `${IMG_PATH_PREFIX}${val}`;
}

async function sliceImage(url, grid) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = "Anonymous"; 
        img.onload = () => {
            const slices = [];
            const pieceWidth = img.width / grid;
            const pieceHeight = img.height / grid;
            
            for (let y = 0; y < grid; y++) {
                for (let x = 0; x < grid; x++) {
                    const canvas = document.createElement('canvas');
                    canvas.width = pieceWidth;
                    canvas.height = pieceHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, x * pieceWidth, y * pieceHeight, pieceWidth, pieceHeight, 0, 0, canvas.width, canvas.height);
                    slices.push(canvas.toDataURL());
                }
            }
            resolve(slices);
        };
        img.onerror = reject;
        img.src = url;
    });
}

function showHint() {
    toggleSet(); 
    const previewLayer = document.getElementById('preview-layer');
    const previewImg = document.getElementById('preview-img');
    const previewBox = document.getElementById('preview-box');
    const closeBtn = document.getElementById('hint-close-btn');
    
    previewImg.src = currentImgUrl;
    
    // === 修正：重置為30%大小且置中 ===
    previewBox.style.animation = 'none';
    
    // 1. 設定寬度為螢幕 30%
    const winW = window.innerWidth;
    const winH = window.innerHeight;
    const targetW = winW * 0.3; 
    
    previewBox.style.width = targetW + 'px';
    previewBox.style.height = 'auto'; // 高度自適應
    
    // 2. 強制渲染以獲取正確高度 (Reflow)
    previewBox.offsetHeight; 
    
    // 3. 計算置中位置 (Left/Top)
    const boxRect = previewBox.getBoundingClientRect();
    const centerX = (winW - boxRect.width) / 2;
    const centerY = (winH - boxRect.height) / 2;
    
    previewBox.style.left = centerX + 'px';
    previewBox.style.top = centerY + 'px';
    
    // 顯示
    closeBtn.style.display = 'block';
    previewLayer.classList.add('show');
}

function closeHint() {
    const previewLayer = document.getElementById('preview-layer');
    const closeBtn = document.getElementById('hint-close-btn');
    previewLayer.classList.remove('show');
    closeBtn.style.display = 'none'; 
}

async function restart() {
    isLocked = true;
    updateStatus("準備圖片中...");
    
    document.getElementById('win-overlay').classList.remove('show');
    gridSize = parseInt(document.getElementById('diff-sel').value);
    currentImgUrl = getImageUrl();
    historyStack = [];
    selectedIdx = -1;

    try {
        slicedImages = await sliceImage(currentImgUrl, gridSize);
    } catch (e) {
        console.error("切割失敗", e);
        updateStatus("圖片載入失敗");
        return;
    }

    updateStatus(TRANSLATIONS[currentLang].msgMemo);

    tiles = Array.from({length: gridSize * gridSize}, (_, i) => i);
    for (let i = tiles.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
    }

    renderTiles();

    // 記憶時間：顯示預覽
    const previewLayer = document.getElementById('preview-layer');
    const previewImg = document.getElementById('preview-img');
    const previewBox = document.getElementById('preview-box');
    const closeBtn = document.getElementById('hint-close-btn');

    closeBtn.style.display = 'none';
    previewImg.src = currentImgUrl;
    
    // 記憶模式也套用 30% 置中邏輯
    const winW = window.innerWidth;
    const winH = window.innerHeight;
    const targetW = winW * 0.3; 
    previewBox.style.width = targetW + 'px';
    previewBox.style.height = 'auto';
    previewBox.offsetHeight;
    const boxRect = previewBox.getBoundingClientRect();
    previewBox.style.left = ((winW - boxRect.width) / 2) + 'px';
    previewBox.style.top = ((winH - boxRect.height) / 2) + 'px';

    previewLayer.classList.add('show');
    
    previewBox.style.animation = 'none';
    previewBox.offsetHeight; 
    previewBox.style.animation = 'memorize 3.5s ease-in-out forwards';

    setTimeout(() => {
        previewLayer.classList.remove('show');
        isLocked = false;
        updateStatus(TRANSLATIONS[currentLang].msgStart);
    }, 3500);
}

function renderTiles() {
    const container = document.getElementById('tiles-container');
    container.innerHTML = '';
    const tileSize = 100 / gridSize;
    
    tiles.forEach((originalIdx, currentPos) => {
        const el = document.createElement('div');
        el.className = 'tile';
        if (currentPos === selectedIdx) el.classList.add('selected');
        
        el.style.width = `${tileSize}%`;
        el.style.height = `${tileSize}%`;
        
        const curX = currentPos % gridSize;
        const curY = Math.floor(currentPos / gridSize);
        el.style.left = `${curX * tileSize}%`;
        el.style.top = `${curY * tileSize}%`;
        
        if (slicedImages[originalIdx]) {
            el.style.backgroundImage = `url('${slicedImages[originalIdx]}')`;
        }
        
        el.onclick = () => onTileClick(currentPos);
        container.appendChild(el);
    });
}

function onTileClick(idx) {
    if (isLocked) return;
    
    playSfx(400); 

    if (selectedIdx === -1) {
        selectedIdx = idx;
        renderTiles();
    } else if (selectedIdx === idx) {
        selectedIdx = -1;
        renderTiles();
    } else {
        historyStack.push([...tiles]);
        [tiles[selectedIdx], tiles[idx]] = [tiles[idx], tiles[selectedIdx]];
        selectedIdx = -1;
        playSfx(600);
        renderTiles();
        checkWin();
    }
}

function checkWin() {
    let isWin = true;
    for (let i = 0; i < tiles.length; i++) {
        if (tiles[i] !== i) {
            isWin = false;
            break;
        }
    }
    if (isWin) {
        isLocked = true;
        playSfx(800, 'win');
        const ol = document.getElementById('win-overlay');
        ol.innerText = TRANSLATIONS[currentLang].msgWin;
        ol.classList.add('show');
    }
}

function undo() {
    if (isLocked || historyStack.length === 0) return;
    tiles = historyStack.pop();
    selectedIdx = -1;
    renderTiles();
}

function updateStatus(txt) {
    document.getElementById('msg').innerText = txt;
}

function playSfx(freq, type) { 
    if(audioCtx.state === 'suspended') audioCtx.resume(); 
    const v = document.getElementById('sfx-vol').value/100; if(v <= 0.01) return; 
    const osc = audioCtx.createOscillator(), g = audioCtx.createGain(); 
    osc.connect(g); g.connect(audioCtx.destination); 
    if(type === 'win') {
        osc.type = "square"; osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
        g.gain.setValueAtTime(v, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1);
        osc.start(); osc.stop(audioCtx.currentTime+1);
    } else {
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(freq/2, audioCtx.currentTime + 0.1);
        g.gain.setValueAtTime(v, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
        osc.start(); osc.stop(audioCtx.currentTime+0.15);
    }
}
